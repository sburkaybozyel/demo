<!doctype html>
<html lang="tr">
<head>

  <title>Konaklama Demo Vitrinleri</title>
  <style>
    body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f3eb;color:#17211b}

    h1{font-family:Georgia,"Times New Roman",serif;font-size:clamp(38px,7vw,76px);line-height:1;margin:0 0 14px}

    <div class="list">
      <a class="demo" href="/kocbey-butik-otel/">
        <strong>Koçbey Butik Otel</strong>
